<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きゃぷちゃ！スタッフ用アプリ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 16px 16px 31vw;
            /* 下部ボタン分の余白 */
        }

        /* ===== エラー表示 ===== */
        #error-screen {
            display: none;
            max-width: 480px;
            margin: 80px auto;
            color: #f66;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* ===== メイン画面 ===== */
        #main-screen {
            display: none;
        }

        #timer-area {
            display: flex;
            align-items: baseline;
            gap: 4vw;
            margin-bottom: 16px;
        }

        #timer {
            font-size: 18vw;
            font-variant-numeric: tabular-nums;
            font-weight: bold;
            letter-spacing: 0.02em;
            color: #fff;
            line-height: 1;
        }

        #timer.warning {
            color: #f80;
        }

        #timer.danger {
            color: #f44;
        }

        #diff {
            font-size: 6vw;
            font-variant-numeric: tabular-nums;
        }

        #diff.positive {
            color: #4f8;
        }

        #diff.negative {
            color: #f66;
        }

        /* タイマーボタン */
        #timer-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            padding: 8px 16px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #1a1a1a;
            color: #ccc;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .ctrl-btn:hover {
            background: #2a2a2a;
        }

        /* シーン情報 */
        #scene-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        #scene-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ccc;
        }

        #scene-step {
            font-size: 0.85rem;
            color: #666;
        }

        /* ステップ表示 */
        #step-display {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4af;
            margin-bottom: 16px;
        }

        /* 役割切り替えボタン */
        #role-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            background: #222;
            border: 1px solid #555;
            border-radius: 4px;
            color: #ccc;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 10;
        }

        #role-btn:hover {
            background: #333;
        }

        /* 台本エリア */
        #script-area {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
            font-size: 1.05rem;
            line-height: 1.9;
            white-space: pre-wrap;
            min-height: 240px;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        /* アナウンス通知エリア */
        #announce-area {
            display: none;
            background: #2a1a00;
            border: 1px solid #f80;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        #announce-text {
            font-size: 1.2rem;
            color: #f80;
            font-weight: bold;
            margin-bottom: 12px;
        }

        #btn-announced {
            padding: 10px 24px;
            background: #f80;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        #btn-announced:hover {
            background: #fa0;
        }

        /* デバッグエリア */
        #debug-area {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #debug-area label {
            font-size: 0.75rem;
            color: #555;
        }

        #debug-input {
            width: 80px;
            padding: 4px 8px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #888;
            font-size: 0.8rem;
        }

        #btn-debug-set {
            padding: 4px 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #666;
            font-size: 0.8rem;
            cursor: pointer;
        }

        #btn-debug-set:hover {
            background: #2a2a2a;
        }

        /* みかんエリア */
        #mikan-area {
            font-size: 2rem;
            line-height: 1.4;
            min-height: 2.5rem;
            margin-bottom: 12px;
            word-break: break-all;
            /* 画面幅で折り返す */
        }

        /* ナビボタン（画面下部固定） */
        #nav-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 0;
            background: #0f0f0f;
            border-top: 1px solid #333;
        }

        .nav-btn {
            padding: 0;
            height: 30vw;
            border: none;
            border-radius: 0;
            background: #1a1a1a;
            color: #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: center;
        }

        #btn-prev {
            flex: 3;
            border-right: 1px solid #333;
        }

        #btn-next {
            flex: 7;
            background: #222;
            color: #4af;
            font-weight: bold;
        }

        .nav-btn:hover:not(:disabled) {
            background: #2a2a2a;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        #btn-next:hover:not(:disabled) {
            background: #1a2a3a;
        }

        /* レスポンシブ */
        @media (max-width: 480px) {
            #script-area {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div id="error-screen"></div>

    <div id="main-screen">
        <button id="role-btn" onclick="switchRole()">はくまい司会</button>
        <div style="display:flex; align-items:flex-start; gap:12px;">
            <div style="flex:1; min-width:0;">
                <div id="timer-area">
                    <div id="timer">30:00</div>
                    <div id="diff"></div>
                </div>
                <div id="timer-controls">
                    <button class="ctrl-btn" onclick="startTimer()">▶ 開始</button>
                    <button class="ctrl-btn" onclick="pauseTimer()">⏸ 一時停止</button>
                    <button class="ctrl-btn" onclick="resetTimer()">↺ リセット</button>
                </div>
                <div id="debug-area">
                    <label>デバッグ（mm:ss）</label>
                    <input type="text" id="debug-input" placeholder="15:00" />
                    <button id="btn-debug-set" onclick="debugSetTime()">セット</button>
                </div>
            </div>
        </div>

        <div id="scene-info">
            <div id="scene-name">—</div>
            <div id="scene-step">—</div>
        </div>
        <div id="step-display">—</div>
        <div id="script-area"></div>

        <div id="announce-area">
            <div id="announce-text"></div>
            <button id="btn-announced" onclick="dismissAnnounce()">アナウンスした ✓</button>
        </div>

        <div id="mikan-area"></div>

        <div id="nav-buttons">
            <button class="nav-btn" id="btn-prev" onclick="moveStep(-1)">◀ 前</button>
            <button class="nav-btn" id="btn-next" onclick="moveStep(1)">次 ▶</button>
        </div>
    </div>

    <script>
        // ===== スプレッドシートID（ここを変更するだけでデータ先を切り替えられる） =====
        const SHEET_ID = '1A4LyHfqfTOxgDDR0yHc_fZcBSYmhlvMxYSC4Ud3NdEI';
        const SHEET_NAME = 'シート1';

        // ===== データ =====
        let scenes = [];   // [{name, steps: [{label, clearTime, hakumai, pureha, obs}]}]
        let currentScene = 0;
        let currentStep = 0;

        // ===== 役割 =====
        const ROLES = ['はくまい司会', 'ぷれはち司会', 'OBS'];
        let currentRole = 0; // 0=はくまい, 1=ぷれはち, 2=OBS

        function switchRole() {
            currentRole = (currentRole + 1) % ROLES.length;
            document.getElementById('role-btn').textContent = ROLES[currentRole];
            renderStep();
            updateAnnounce();
        }

        // ===== タイマー =====
        const TOTAL_SEC = 30 * 60;
        let remaining = TOTAL_SEC;
        let timerRunning = false;
        let timerInterval = null;

        // ===== 起動時にスプレッドシートを自動読み込み =====
        window.addEventListener('DOMContentLoaded', async () => {
            const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                parseCSV(text);
                document.getElementById('main-screen').style.display = 'block';
                renderStep();
            } catch (e) {
                const el = document.getElementById('error-screen');
                el.style.display = 'block';
                el.textContent = 'データの読み込みに失敗しました: ' + e.message;
            }
        });

        // ===== CSV パース =====
        // フォーマット（1行目はヘッダー）:
        // A: シーン名 | B: ステップ名 | C: 想定タイム | D: はくまい司会 | E: ぷれはち司会 | F: OBS
        function parseCSV(text) {
            const rows = csvToArray(text);
            if (rows.length < 2) throw new Error('データが空です');

            scenes = [];
            let lastSceneName = null;

            for (let i = 1; i < rows.length; i++) {
                const [sceneName, stepLabel, clearTime, hakumai, pureha, obs] = rows[i];

                // シーン名もステップ名もない → 直前ステップの各台本に改行して追記
                if (!sceneName && !stepLabel) {
                    if (scenes.length > 0) {
                        const lastScene = scenes[scenes.length - 1];
                        if (lastScene.steps.length > 0) {
                            const last = lastScene.steps[lastScene.steps.length - 1];
                            last.hakumai += '\n' + (hakumai || '');
                            last.pureha += '\n' + (pureha || '');
                            last.obs += '\n' + (obs || '');
                        }
                    }
                    continue;
                }

                if (sceneName && sceneName !== lastSceneName) {
                    scenes.push({ name: sceneName, steps: [] });
                    lastSceneName = sceneName;
                }
                if (stepLabel !== undefined) {
                    scenes[scenes.length - 1].steps.push({
                        label: stepLabel || '',
                        clearTime: parseTime(clearTime),
                        hakumai: hakumai || '',
                        pureha: pureha || '',
                        obs: obs || '',
                    });
                }
            }
            currentScene = 0;
            currentStep = 0;
        }

        function parseTime(str) {
            if (!str) return 0;
            const parts = str.trim().split(':');
            if (parts.length === 2) return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            return parseInt(str) || 0;
        }

        // セル内改行（"...\n..."）に対応したCSVパーサー
        // 文字列全体を1文字ずつ読み、ダブルクォート内の改行は行区切りとして扱わない
        function csvToArray(text) {
            const rows = [];
            let cur = '', inQ = false, row = [];

            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (c === '"') {
                    if (inQ && text[i + 1] === '"') { cur += '"'; i++; } // エスケープ ""
                    else inQ = !inQ;
                } else if (c === ',' && !inQ) {
                    row.push(cur); cur = '';
                } else if ((c === '\n' || (c === '\r' && text[i + 1] === '\n')) && !inQ) {
                    if (c === '\r') i++; // \r\n を1つとして処理
                    row.push(cur); cur = '';
                    if (row.some(cell => cell.trim())) rows.push(row); // 空行はスキップ
                    row = [];
                } else {
                    cur += c;
                }
            }
            // 最終行
            row.push(cur);
            if (row.some(cell => cell.trim())) rows.push(row);

            return rows;
        }

        // ===== アナウンス =====
        // 残り時間（秒）→ アナウンス文言。falseになったら非表示
        const ANNOUNCE_TIMES = [15 * 60, 10 * 60, 5 * 60]; // 15分・10分・5分
        const dismissed = new Set(); // 「アナウンスした」を押した残り時間

        function updateAnnounce() {
            // OBSロールは表示しない
            if (currentRole === 2) {
                document.getElementById('announce-area').style.display = 'none';
                return;
            }
            const area = document.getElementById('announce-area');
            // 現在表示中かどうか確認
            const activeTime = ANNOUNCE_TIMES.find(t => remaining <= t && remaining > t - 60 && !dismissed.has(t));
            if (activeTime !== undefined) {
                const min = activeTime / 60;
                document.getElementById('announce-text').textContent = `アナウンス「残り${min}分です！」`;
                area.style.display = 'block';
            } else {
                area.style.display = 'none';
            }
        }

        function dismissAnnounce() {
            const activeTime = ANNOUNCE_TIMES.find(t => remaining <= t && remaining > t - 60 && !dismissed.has(t));
            if (activeTime !== undefined) dismissed.add(activeTime);
            document.getElementById('announce-area').style.display = 'none';
        }

        // ===== デバッグ：残り時間を手動セット =====
        function debugSetTime() {
            const val = document.getElementById('debug-input').value.trim();
            const parts = val.split(':');
            let sec = 0;
            if (parts.length === 2) sec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
            else sec = parseInt(val);
            if (isNaN(sec) || sec < 0 || sec > TOTAL_SEC) return;
            remaining = sec;
            updateTimerDisplay();
            updateAnnounce();
        }

        // ===== タイマー =====
        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            timerInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) { remaining = 0; clearInterval(timerInterval); timerRunning = false; }
                updateTimerDisplay();
                updateAnnounce();
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
        }

        function resetTimer() {
            pauseTimer();
            remaining = TOTAL_SEC;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            const diffEl = document.getElementById('diff');

            timerEl.textContent = formatTime(remaining);
            timerEl.className = remaining <= 60 ? 'danger' : remaining <= 300 ? 'warning' : '';

            const curStep = scenes[currentScene] && scenes[currentScene].steps[currentStep];
            let overSec = 0; // 超過秒数（マイナスのとき）
            if (curStep && curStep.clearTime > 0) {
                const expectedRemaining = TOTAL_SEC - curStep.clearTime;
                const diff = remaining - expectedRemaining;
                const sign = diff >= 0 ? '+' : '-';
                diffEl.textContent = sign + formatTime(Math.abs(diff));
                diffEl.className = diff >= 0 ? 'positive' : 'negative';
                if (diff < 0) overSec = Math.abs(diff); // 遅れている秒数
            } else {
                diffEl.textContent = '';
                diffEl.className = '';
            }

            // みかん：10秒超過ごとに1個
            const mikanCount = Math.floor(overSec / 10);
            document.getElementById('mikan-area').textContent = '🍊'.repeat(mikanCount);
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // ===== シーン・ステップ表示 =====
        function moveStep(dir) {
            if (scenes.length === 0) return;
            const scene = scenes[currentScene];
            const newStep = currentStep + dir;

            if (newStep < 0) {
                if (currentScene > 0) {
                    currentScene--;
                    currentStep = scenes[currentScene].steps.length - 1;
                }
            } else if (newStep >= scene.steps.length) {
                if (currentScene < scenes.length - 1) {
                    currentScene++;
                    currentStep = 0;
                }
            } else {
                currentStep = newStep;
            }
            renderStep();
        }

        function renderStep() {
            if (scenes.length === 0) return;
            const scene = scenes[currentScene];
            const step = scene.steps[currentStep] || { label: '—', hakumai: '—', pureha: '—', obs: '—' };

            // 現在の役割に対応する台本を選択
            const scriptKey = ['hakumai', 'pureha', 'obs'][currentRole];

            document.getElementById('scene-name').textContent = scene.name;
            document.getElementById('scene-step').textContent = `${currentStep + 1} / ${scene.steps.length}`;
            document.getElementById('step-display').textContent = step.label;
            document.getElementById('script-area').textContent = step[scriptKey];

            document.getElementById('btn-prev').disabled =
                currentScene === 0 && currentStep === 0;
            document.getElementById('btn-next').disabled =
                currentScene === scenes.length - 1 && currentStep === scene.steps.length - 1;

            // ステップ名が「1問目」になったら自動タイマースタート
            if (step.label === '1問目' && !timerRunning) startTimer();

            updateTimerDisplay();
        }
    </script>
</body>

</html>
